# Aperture array layout (positions in meters, instrument frame)
# x, y: meters from array reference origin

schema_version: 1
units:
  position: m

reference:
  origin: array_center   # describe your frame in code/docs
  # x: e.g. along dispersion; y: e.g. cross-dispersion


apertures:
  - name: aperture_00
    amplitude: 1.0
    phi_dc_deg: 0
    x_m: -7.2
    y_m: 0.0

  - name: aperture_01
    amplitude: 1.0
    phi_dc_deg: 180
    x_m: 7.2
    y_m: 0.0

# apertures variables:
# amplitude: amplitude of the aperture
# phi_dc_deg: phase offset of the aperture (in degrees, since pi is hard to set in a yaml file)
# x_m: x position of the aperture
# y_m: y position of the aperture